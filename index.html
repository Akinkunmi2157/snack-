<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snack Haven</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="container">
        <div class="nav">
            <div class="logo"><img src="./img/chef.uniform.jpeg" alt="chef pics">
                <h2>Snack <span>Haven</span></h2>
            </div>
            <div class="menus">
                <a href="#">Home</a>
                <a href="#"><i>About Us</i></a>
                <a href="#">Snacks</a>
                <a href="#"><i>Deals</i></a>
                <a href="#"><i>Contact</i></a>
            </div>
            <div class="profile">
                <img src="./img/Shopping cart.jpeg"
                    class="shop" alt="">
                <img src="./img/profile.jpeg"
                    class="avatar">
            </div>
        </div>
        <div class="hero">
            <div class="semi">
                <div class="line">
                    <div class="dot"></div>
                </div>
                <h3><i>Tasty Snack In Action</i></h3>
                <div class="line2">
                    <div class="dot2"></div>
                </div>
            </div>
            <div class="video-container">
                <video controls muted playsinline>
                    <source src="./video/my snack.mp4" type="video/mp4">
                </video>
                <h1>We Sell Affordable Snack</h1>
            </div>

        </div>
    </div>
        <div class="nav2">
            <div class="disc">
                <img src="./img/Samosa.jpeg" class="snacks" alt="" >
                <h4><i>Wide Variety Of Snacks</i></h4>
                <p>Chips,Sweets,Nuts & More!</p>
            </div>
            <div class="horizon"></div>
            <div class="disc2">
                <img src="./img/truck.jpeg" class="Delivery" alt="">
                <h4><i>Fast & Easy Delivery</i></h4>
                <p>Right to Your Doorstep</p>
            </div>
            <div class="horizon2"></div>
            <div class="disc3">
                <img src="./img/discount.jpeg" class="offer" alt="">
                <h4><i>Special Offers & Discounts</i></h4>
                <p>Save Big on Snack Packs!</p>
            </div>
        </div>

    <div class="container2">
        <div class="hero2">
            <div class="semi2">
                <div class="str">
                    <div class="point"></div>
                </div>
                <h3><i>Best Sellers</i></h3>
                <div class="str2">
                    <div class="point2"></div>
                </div>
            </div>
      </div>
    </div>
    
</body>

</html>
